<!DOCTYPE html>
<html lang="es">
<head>

<!-- =========================
        META DATOS
========================= -->
<meta charset="UTF-8">

<title>Pre-Registro de Aspirantes | Universidad Politécnica Mesoamericana</title>

<meta name="description" content="Formulario de pre-registro para aspirantes de la Universidad Politécnica Mesoamericana.">

<meta name="keywords" content="UPM, preregistro universidad, admisiones UPM, universidad Tenosique">

<meta name="author" content="Universidad Politécnica Mesoamericana">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="style.css">
<link rel="icon" href="assets/icon/favicon.png" type="image/png">

</head>


<body>

<div id="header-container"></div>

<!-- =========================
        CONTENIDO PRINCIPAL
========================= -->
<main>

<section class="formulario-admision">

<h1>Pre-Registro de Aspirantes</h1>

<p class="texto-promo">
Completa el siguiente formulario para iniciar tu proceso de admisión en la
<strong>Universidad Politécnica Mesoamericana</strong>.
Nuestro equipo se pondrá en contacto contigo para brindarte información
sobre el proceso de inscripción.
</p>


<!-- =========================
        FORMULARIO
========================= -->

<form action="https://formspree.io/f/mojaqlzv" method="POST" class="form-registro">


<label for="nombre">Nombre completo *</label>
<input 
type="text" 
id="nombre" 
name="nombre" 
placeholder="Escribe tu nombre completo"
required
minlength="5"
>


<label for="email">Correo electrónico *</label>
<input 
type="email" 
id="email" 
name="email" 
placeholder="ejemplo@email.com"
required
>


<label for="telefono">Teléfono *</label>
<input 
type="tel" 
id="telefono" 
name="telefono"
placeholder="10 dígitos"
pattern="[0-9]{10}"
required
>

<label for="carrera">Carrera de interés *</label>

<select id="carrera" name="carrera" required>

<option value="" disabled selected>Seleccione una opción</option>

<option value="itid">
Ingeniería en Tecnologías de la Información e Innovación Digital
</option>

<option value="imrn">
Ingeniería en Manejo de Recursos Naturales
</option>

<option value="ip">
Ingeniería Petrolera
</option>

<option value="lgdt">
Licenciatura en Gestión y Desarrollo Turístico
</option>

<option value="lcia">
Licenciatura en Comercio Internacional y Aduanas
</option>

</select>


<label for="mensaje">Mensaje o duda (opcional)</label>
<textarea 
id="mensaje"
name="mensaje"
rows="4"
placeholder="Escribe aquí alguna duda o comentario...">
</textarea>


<!-- consentimiento -->

<label class="checkbox">

<input type="checkbox" required>

Acepto que mis datos sean utilizados para fines informativos relacionados
con el proceso de admisión de la Universidad Politécnica Mesoamericana.

</label>


<br>

<button type="submit" class="btn">
Enviar Pre-Registro
</button>

</form>

</section>

</main>



<div id="footer-container"></div>

<!-- =========================
        BOTÓN WHATSAPP
========================= -->
<a href="https://wa.me/529341347639?text=Hola%20quiero%20informes%20sobre%20las%20inscripciones"
class="whatsapp-float"
target="_blank">

<img src="assets/icon/whatsapp.png" alt="WhatsApp UPM">

</a>

<script src="faq.js"></script>
<script src="js/cargar-componentes.js"></script>

</body>
</html>
